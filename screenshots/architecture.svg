<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#701a75"/>
      <stop offset="100%" style="stop-color:#4a044e"/>
    </linearGradient>
    <linearGradient id="box4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="box5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#064e3b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6366f1"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="bold">NoSQLHunter — Architecture</text>
  <text x="550" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Advanced NoSQL Injection Exploitation Framework</text>

  <!-- ===== CLI Layer ===== -->
  <rect x="40" y="75" width="1020" height="55" rx="8" fill="url(#box1)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="97" fill="#818cf8" font-size="13" font-weight="bold">▸ CLI Layer</text>
  <text x="60" y="117" fill="#94a3b8" font-size="11">argparse: --url --proxy --dataset --depth --concurrency --verbose --output</text>

  <!-- Arrow: CLI → Core -->
  <line x1="550" y1="130" x2="550" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Core Engine ===== -->
  <rect x="40" y="162" width="1020" height="75" rx="8" fill="url(#box2)" stroke="#4338ca" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="185" fill="#a5b4fc" font-size="13" font-weight="bold">▸ Core Engine — NoSQLInjector</text>
  <text x="60" y="205" fill="#c7d2fe" font-size="11">Session Management · Thread Pool (concurrent.futures) · Response Analysis · Timeline Logging</text>
  <text x="60" y="222" fill="#93c5fd" font-size="11">proxy support · auto-install dependencies · JSON report generation · UUID tracing</text>

  <!-- Core → 4 sub-modules -->
  <line x1="170" y1="237" x2="170" y2="275" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="237" x2="410" y2="275" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="237" x2="650" y2="275" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="890" y1="237" x2="890" y2="275" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Module 1: Discovery -->
  <rect x="40" y="277" width="260" height="150" rx="8" fill="url(#box1)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="300" fill="#f472b6" font-size="12" font-weight="bold">🔍 Hellhound Spider</text>
  <text x="60" y="320" fill="#94a3b8" font-size="10">─ robots.txt parser</text>
  <text x="60" y="336" fill="#94a3b8" font-size="10">─ sitemap.xml parser</text>
  <text x="60" y="352" fill="#94a3b8" font-size="10">─ JS file API discovery</text>
  <text x="60" y="368" fill="#94a3b8" font-size="10">─ Link extraction (regex)</text>
  <text x="60" y="384" fill="#94a3b8" font-size="10">─ Parameter enumeration</text>
  <text x="60" y="400" fill="#94a3b8" font-size="10">─ Security tag classification</text>
  <text x="60" y="416" fill="#facc15" font-size="10">Output: endpoints + params + tags</text>

  <!-- Module 2: Attack -->
  <rect x="320" y="277" width="260" height="150" rx="8" fill="url(#box3)" stroke="#86198f" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="300" fill="#e879f9" font-size="12" font-weight="bold">⚡ Attack Modules</text>
  <text x="340" y="320" fill="#d8b4fe" font-size="10">─ Auth Bypass ($ne, $regex, $gt)</text>
  <text x="340" y="336" fill="#d8b4fe" font-size="10">─ Query Injection (blank query)</text>
  <text x="340" y="352" fill="#d8b4fe" font-size="10">─ GET Parameter Injection</text>
  <text x="340" y="368" fill="#d8b4fe" font-size="10">─ $where JS Tautology</text>
  <text x="340" y="384" fill="#d8b4fe" font-size="10">─ $where Code Execution</text>
  <text x="340" y="400" fill="#d8b4fe" font-size="10">─ $where Error Exfiltration</text>
  <text x="340" y="416" fill="#facc15" font-size="10">─ Blind Regex Char Extraction</text>

  <!-- Module 3: Dataset -->
  <rect x="600" y="277" width="260" height="150" rx="8" fill="url(#box4)" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="300" fill="#60a5fa" font-size="12" font-weight="bold">📦 Payload Dataset</text>
  <text x="620" y="320" fill="#93c5fd" font-size="10">─ 6000+ payloads · 50+ categories</text>
  <text x="620" y="336" fill="#93c5fd" font-size="10">─ 16 database engines:</text>
  <text x="620" y="352" fill="#93c5fd" font-size="10">  MongoDB · CouchDB · Redis</text>
  <text x="620" y="368" fill="#93c5fd" font-size="10">  Elasticsearch · DynamoDB</text>
  <text x="620" y="384" fill="#93c5fd" font-size="10">  Cassandra · Firebase · HBase</text>
  <text x="620" y="400" fill="#93c5fd" font-size="10">  Neo4j · Couchbase · ArangoDB +</text>
  <text x="620" y="416" fill="#facc15" font-size="10">Sources: PTAS, HT, PS, OWASP</text>

  <!-- Module 4: Analysis -->
  <rect x="880" y="277" width="180" height="150" rx="8" fill="url(#box5)" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="900" y="300" fill="#34d399" font-size="12" font-weight="bold">📊 Analyzer</text>
  <text x="900" y="320" fill="#a7f3d0" font-size="10">─ Response scoring</text>
  <text x="900" y="336" fill="#a7f3d0" font-size="10">─ Baseline comparison</text>
  <text x="900" y="352" fill="#a7f3d0" font-size="10">─ Sensitive data detection</text>
  <text x="900" y="368" fill="#a7f3d0" font-size="10">─ Size anomaly detection</text>
  <text x="900" y="384" fill="#a7f3d0" font-size="10">─ Auth success detection</text>
  <text x="900" y="400" fill="#a7f3d0" font-size="10">─ Bulk data identification</text>
  <text x="900" y="416" fill="#facc15" font-size="10">Score ≥ 3 = vulnerable</text>

  <!-- Modules → Output arrows -->
  <line x1="170" y1="427" x2="170" y2="470" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="450" y1="427" x2="450" y2="470" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="730" y1="427" x2="730" y2="470" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="970" y1="427" x2="970" y2="470" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ===== Output Layer ===== -->
  <rect x="40" y="472" width="1020" height="70" rx="8" fill="url(#box1)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="495" fill="#fbbf24" font-size="13" font-weight="bold">▸ Output &amp; Reporting</text>
  <text x="60" y="515" fill="#94a3b8" font-size="11">─ JSON report with findings, timeline, errors, summary, confidence scoring</text>
  <text x="60" y="532" fill="#94a3b8" font-size="11">─ Color-coded console output · Critical / High / Medium severity classification · CVE-style remediation</text>

  <!-- Output → Target arrow -->
  <line x1="550" y1="542" x2="550" y2="572" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- ===== Target ===== -->
  <rect x="240" y="574" width="620" height="55" rx="8" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="550" y="597" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">🎯 Target Web Application (MongoDB / CouchDB / Redis / Elasticsearch / etc.)</text>
  <text x="550" y="616" text-anchor="middle" fill="#f87171" font-size="11">POST /api/login · GET /api/search · POST /api/data · $where injection points</text>

  <!-- ===== Flow annotations ===== -->
  <text x="170" y="262" text-anchor="middle" fill="#6366f1" font-size="10">Discovery</text>
  <text x="450" y="262" text-anchor="middle" fill="#6366f1" font-size="10">Exploitation</text>
  <text x="730" y="262" text-anchor="middle" fill="#6366f1" font-size="10">Payloads</text>
  <text x="970" y="262" text-anchor="middle" fill="#6366f1" font-size="10">Analysis</text>

  <!-- Legend -->
  <rect x="40" y="645" width="1020" height="90" rx="8" fill="#0d1117" stroke="#1f2937" stroke-width="1"/>
  <text x="60" y="668" fill="#94a3b8" font-size="11" font-weight="bold">Execution Flow:</text>
  <rect x="60" y="678" width="14" height="14" rx="3" fill="#312e81"/>
  <text x="80" y="690" fill="#94a3b8" font-size="10">1. CLI parses arguments → Core Engine initializes session, threads, payload loader</text>
  <rect x="60" y="698" width="14" height="14" rx="3" fill="#701a75"/>
  <text x="80" y="710" fill="#94a3b8" font-size="10">2. Hellhound Spider discovers endpoints → Attack Modules test each endpoint with payloads</text>
  <rect x="510" y="678" width="14" height="14" rx="3" fill="#1e40af"/>
  <text x="530" y="690" fill="#94a3b8" font-size="10">3. Analyzer scores responses → Vulnerabilities logged to timeline &amp; JSON report</text>
  <rect x="510" y="698" width="14" height="14" rx="3" fill="#065f46"/>
  <text x="530" y="710" fill="#94a3b8" font-size="10">4. Data extraction on vulnerable endpoints → Summary with CVE-style remediation</text>
</svg>